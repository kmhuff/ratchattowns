{{ define "main" }}
    {{- with .Site.Params.profile_pic }}
        {{- with resources.Get . }}
            {{- $width := .Width }}
            {{- with .Crop (printf "%dx%d TopRight webp" $width $width) }}
                <img src="{{ .RelPermalink }}" alt="A ratchet, lit dramatically">
            {{- end }}
        {{- end }}
    {{- end }}

    {{ .Content }}
{{ end }}
